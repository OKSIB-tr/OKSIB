<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reklam Panosu | OKSIB</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: #0a0a0a; color: #fff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; }

        /* Navigasyon Menüsü */
        nav { position: fixed; top: 20px; right: 20px; z-index: 1000; }
        .menu-btn { cursor: pointer; display: flex; flex-direction: column; gap: 7px; padding: 10px; }
        .menu-btn span { width: 30px; height: 2px; background: #fff; transition: 0.3s; }
        .side-menu { position: fixed; top: 0; right: -100%; width: 280px; height: 100vh; background: #111; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: 0.4s; z-index: 999; }
        .side-menu.active { right: 0; }
        .side-menu a { color: #888; text-decoration: none; margin: 15px; font-size: 1.2rem; }

        /* Üst Logo Alanı */
        .logo-area { margin-top: 50px; height: 150px; perspective: 1000px; display: flex; align-items: center; justify-content: center; }
        #track-text { font-size: 5rem; font-weight: 900; letter-spacing: 15px; transition: 0.1s; pointer-events: none; }

        /* Reklam Bilgi */
        .info { text-align: center; margin-bottom: 30px; color: #888; }
        .info a { color: #ff4d4d; text-decoration: none; font-weight: bold; }

        /* 50 KARELİK PANO */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(10, 1fr); /* Yan yana 10 tane */
            gap: 10px;
            width: 95%;
            max-width: 900px;
            padding: 20px;
            background: #111;
            border-radius: 15px;
            border: 1px solid #222;
            margin-bottom: 50px;
        }

        .square {
            background: #0d0d0d;
            aspect-ratio: 1 / 1;
            border: 1px solid #222;
            border-radius: 5px;
            transition: 0.3s;
        }

        .square:hover {
            background: #222;
            border-color: #fff;
            transform: scale(1.1);
            z-index: 5;
        }

        /* Alt Metin */
        .motive { color: #444; font-style: italic; text-align: center; max-width: 600px; margin-bottom: 50px; }

        /* Mobil Uyumluluk */
        @media (max-width: 700px) {
            .grid-container { grid-template-columns: repeat(5, 1fr); } /* Mobilde yan yana 5 tane */
            #track-text { font-size: 3rem; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="menu-btn" onclick="toggleMenu()">
            <span></span><span></span><span></span>
        </div>
    </nav>

    <div class="side-menu" id="sideMenu">
        <a href="index.html">ANA SAYFA</a>
        <a href="iletisim.html">İLETİŞİM</a>
        <a href="sosyal.html">SOSYAL MEDYA</a>
        <a href="fotograf.html">FOTOĞRAF</a>
        <a href="reklam.html">REKLAM PANOSU</a>
    </div>

    <div class="logo-area">
        <h1 id="track-text">OKSIB</h1>
    </div>

    <div class="info">
        <p>Reklam yeri almak için <a href="iletisim.html">İletişim Sayfasından</a> bize ulaşın.</p>
    </div>

    <div class="grid-container">
        <div class="square"></div><div class="square"></div><div class="square"></div><div class="square"></div><div class="square"></div>
        <div class="square"></div><div class="square"></div><div class="square"></div><div class="square"></div><div class="square"></div>
        <div class="square"></div><div class="square"></div><div class="square"></div><div class="square"></div><div class="square"></div>
        <div class="square"></div><div class="square"></div><div class="square"></div><div class="square"></div><div class="square"></div>
        <div class="square"></div><div class="square"></div><div class="square"></div><div class="square"></div><div class="square"></div>
        <div class="square"></div><div class="square"></div><div class="square"></div><div class="square"></div><div class="square"></div>
        <div class="square"></div><div class="square"></div><div class="square"></div><div class="square"></div><div class="square"></div>
        <div class="square"></div><div class="square"></div><div class="square"></div><div class="square"></div><div class="square"></div>
        <div class="square"></div><div class="square"></div><div class="square"></div><div class="square"></div><div class="square"></div>
        <div class="square"></div><div class="square"></div><div class="square"></div><div class="square"></div><div class="square"></div>
    </div>

    <p class="motive">"Vizyonunuzu bu küçük karelere sığdırmıyoruz, onları dünyaya açılan birer pencereye dönüştürüyoruz."</p>

    <script>
        function toggleMenu() {
            document.getElementById('sideMenu').classList.toggle('active');
        }

        // Fare Takibi
        const logo = document.getElementById('track-text');
        document.addEventListener('mousemove', (e) => {
            let x = (window.innerWidth / 2 - e.pageX) / 20;
            let y = (window.innerHeight / 2 - e.pageY) / 20;
            logo.style.transform = `rotateY(${-x}deg) rotateX(${y}deg)`;
        });
    </script>
</body>
</html>
