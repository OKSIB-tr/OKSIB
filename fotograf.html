<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeler | OKSIB</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: #0a0a0a;
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Navigasyon */
        nav { position: fixed; top: 20px; right: 20px; z-index: 1000; }
        .menu-btn { cursor: pointer; display: flex; flex-direction: column; gap: 7px; padding: 10px; }
        .menu-btn span { width: 30px; height: 2px; background: #fff; transition: 0.3s; }

        .side-menu {
            position: fixed; top: 0; right: -100%; width: 280px; height: 100vh;
            background: #111; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; transition: 0.4s; z-index: 999;
        }
        .side-menu.active { right: 0; }
        .side-menu a { color: #888; text-decoration: none; margin: 15px; font-size: 1.2rem; }

        /* İçerik */
        .container {
            max-width: 1200px;
            margin: 80px auto;
            text-align: center;
            padding: 20px;
        }

        h1 { font-size: 3rem; letter-spacing: 8px; margin-bottom: 20px; }
        
        .motive-text {
            color: #666; font-style: italic; margin-bottom: 50px; line-height: 1.6;
        }

        /* Ana Proje Kartları (Top 3) */
        .top-projects {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }

        .project-card {
            background: #151515;
            height: 400px;
            border-radius: 40px; /* Köşeleri yuvarlak */
            border: 1px solid #222;
            cursor: pointer;
            overflow: hidden;
            transition: 0.4s;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .project-card:hover { transform: scale(1.02); border-color: #444; }
        .project-card span { font-weight: bold; letter-spacing: 2px; color: #444; }

        /* Galeri Katmanı (Overlay) */
        .gallery-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 10, 10, 0.98);
            z-index: 2000;
            display: none; /* Başlangıçta gizli */
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            animation: fadeIn 0.5s forwards;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .close-btn {
            position: absolute; top: 30px; right: 40px;
            font-size: 1.2rem; cursor: pointer; color: #888;
            border: 1px solid #333; padding: 10px 20px; border-radius: 50px;
        }
        .close-btn:hover { color: #fff; border-color: #fff; }

        /* 9'lu Izgara */
        .grid-9 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            max-width: 800px;
            width: 100%;
        }

        .grid-item {
            background: #1a1a1a;
            aspect-ratio: 1;
            border-radius: 20px; /* Kare değil yuvarlak köşeli */
            border: 1px solid #333;
            transition: 0.3s;
            background-size: cover;
            background-position: center;
        }

        .grid-item:hover {
            transform: scale(1.1); /* Fare gelince büyüme */
            z-index: 10;
            border-color: #fff;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <nav>
        <div class="menu-btn" onclick="toggleMenu()">
            <span></span><span></span><span></span>
        </div>
    </nav>

    <div class="side-menu" id="sideMenu">
        <a href="index.html">ANA SAYFA</a>
        <a href="iletisim.html">İLETİŞİM</a>
        <a href="sosyal.html">SOSYAL MEDYA</a>
        <a href="fotograf.html">FOTOĞRAF</a>
        <a href="reklam.html">REKLAM PANOSU</a>
    </div>

    <div class="container">
        <h1>ŞUANKİ TOP 3 PROJEMİZ</h1>
        <p class="motive-text">
            "Gördükleriniz sadece birer kare değil, arkasında yatan emeğin ve vizyonun birer kanıtıdır. 
            Mükemmellik detaylarda saklıdır ve biz o detayları inşa etmek için buradayız."
        </p>

        <div class="top-projects">
            <div class="project-card" onclick="openGallery('PC TOPLAMA')"><span>PROJE 1</span></div>
            <div class="project-card" onclick="openGallery('TASARIM')"><span>PROJE 2</span></div>
            <div class="project-card" onclick="openGallery('MODİFİYE')"><span>PROJE 3</span></div>
        </div>
    </div>

    <div class="gallery-overlay" id="galleryOverlay">
        <div class="close-btn" onclick="closeGallery()">GERİ DÖN</div>
        <h2 id="galleryTitle" style="margin-bottom: 30px; letter-spacing: 5px;"></h2>
        <div class="grid-9">
            <div class="grid-item"></div><div class="grid-item"></div><div class="grid-item"></div>
            <div class="grid-item"></div><div class="grid-item"></div><div class="grid-item"></div>
            <div class="grid-item"></div><div class="grid-item"></div><div class="grid-item"></div>
        </div>
    </div>

    <script>
        function toggleMenu() {
            const menu = document.getElementById('sideMenu');
            menu.classList.toggle('active');
        }

        function openGallery(title) {
            document.getElementById('galleryTitle').innerText = title;
            document.getElementById('galleryOverlay').style.display = 'flex';
            document.body.style.overflow = 'hidden'; // Arka plan kaymasın
        }

        function closeGallery() {
            document.getElementById('galleryOverlay').style.display = 'none';
            document.body.style.overflow = 'auto';
        }
    </script>
</body>
</html>
